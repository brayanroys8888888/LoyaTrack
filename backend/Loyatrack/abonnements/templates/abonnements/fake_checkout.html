<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paiement (simulation) — Loyatrack</title>
  <style>
    body { font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:#f4f6f8; color:#1a2233;
           display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
    .box { background:#fff; border:1px solid #e0e0e0; border-radius:16px; padding:28px; max-width:380px; text-align:center; }
    .amount { font-size:26px; font-weight:800; color:#1565C0; margin:8px 0 4px; }
    .muted { color:#5f6368; font-size:13px; }
    button { margin-top:20px; width:100%; padding:12px; border:none; border-radius:10px; background:#2E7D32;
             color:#fff; font-size:15px; font-weight:700; cursor:pointer; }
    .warn { margin-top:14px; font-size:11px; color:#9e9e9e; }
  </style>
</head>
<body>
  <div class="box">
    <div class="muted">Abonnement Loyatrack — {{ tx.get_plan_display }} ({{ tx.get_periodicite_display }})</div>
    <div class="amount">{{ tx.montant|floatformat:0 }} {{ tx.devise }}</div>
    <form method="post">
      {% csrf_token %}
      <button type="submit">Simuler un paiement réussi</button>
    </form>
    <div class="warn">Page de simulation (prestataire de test). Remplacée par CinetPay en production.</div>
  </div>
</body>
</html>
