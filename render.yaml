# Blueprint Render — déploiement de l'API Loyatrack (tests d'intégration).
# Crée un service web (Django/gunicorn) + une base PostgreSQL.
# Les secrets (sync:false) sont à renseigner dans le dashboard Render après création.

databases:
  - name: loyatrack-db
    plan: free
    databaseName: loyatrack
    user: loyatrack

services:
  - type: web
    name: loyatrack-api
    runtime: python
    plan: free
    rootDir: backend/Loyatrack
    buildCommand: "pip install -r ../requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn Loyatrack.wsgi:application"
    healthCheckPath: /swagger/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: loyatrack-db
          property: connectionString
      # --- Twilio (laisser vide pour des tests sans SMS, ou renseigner) ---
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      # --- Abonnement : 'fake' pour tester sans CinetPay ---
      - key: PAIEMENT_PROVIDER
        value: "fake"
